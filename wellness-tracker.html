  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }

    /* ── Phone frame ── */
    .phone-frame {
      position: fixed;
      inset: 0;
      background: #F5F3FF;
      overflow: hidden;
    }
    @media (min-width: 480px) {
      body { background: #1C1A2E; }
      .phone-frame {
        inset: unset;
        top: 50%;
        left: 50%;
        width: 390px;
        height: min(844px, 100dvh);
        transform: translate(-50%, -50%);
        border-radius: 44px;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.10),
          0 32px 80px rgba(0,0,0,0.55),
          0 8px 24px rgba(0,0,0,0.30);
      }
    }

    /* ── Press animation ── */
    .press { transition: transform 0.13s cubic-bezier(0.36,0.07,0.19,0.97); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .press:active { transform: scale(0.93); }
    .press-light:active { transform: scale(0.97); }

    /* ── Swap User tooltip ── */
    .swap-user-wrap { position: relative; }
    .swap-user-tip {
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: rgba(30,30,30,0.88); color: #fff;
      font-size: 11px; font-weight: 600; white-space: nowrap;
      padding: 4px 9px; border-radius: 8px;
      pointer-events: none; opacity: 0; transition: opacity 0.15s ease;
    }
    .swap-user-wrap:hover .swap-user-tip { opacity: 1; }

    /* ── Hide scrollbar ── */
    .no-scroll::-webkit-scrollbar { display: none; }
    .no-scroll { scrollbar-width: none; }

    /* ── Tab active pill ── */
    .tab-pill-active {
      background: white;
      color: #6D28D9;
      box-shadow: 0 2px 10px rgba(109,40,217,0.15);
    }
    .tab-pill-inactive { color: #9CA3AF; }

    /* ── Nav active ── */
    .nav-active { color: #7C3AED; }
    .nav-inactive { color: #D1D5DB; }

    /* ── Tile hover glow (desktop only) ── */
    @media (hover: hover) {
      .activity-tile:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.12); transform: translateY(-2px); }
    }
    .activity-tile { transition: transform 0.13s cubic-bezier(0.36,0.07,0.19,0.97), box-shadow 0.2s ease; }
    .activity-tile:active { transform: scale(0.93); }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Screen slide animation ── */
    @keyframes slideInRight { from { opacity:0; transform:translateX(28px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideInLeft  { from { opacity:0; transform:translateX(-28px); } to { opacity:1; transform:translateX(0); } }
    .slide-in-right { animation: slideInRight 0.22s ease both; }
    .slide-in-left  { animation: slideInLeft  0.22s ease both; }
  </style>
</head>

    async function sbLoadWellness() {
      if (!sb || !MEMBER_ID) return null;
      const [{ data: acts }, { data: lvl }] = await Promise.all([
        sb.from('allusbasecamp_wellness').select('*').eq('member_id', MEMBER_ID),
        sb.from('allusbasecamp_wellness_level').select('level_idx').eq('member_id', MEMBER_ID).maybeSingle(),
      ]);
      return { acts: acts || [], levelIdx: lvl?.level_idx ?? null };
    }

    async function sbSaveActivity(id, status, freq, streak) {
      if (!sb || !MEMBER_ID) return;
      await sb.from('allusbasecamp_wellness').upsert(
        { member_id: MEMBER_ID, activity_id: id, status, freq, streak, updated_at: new Date().toISOString() },
        { onConflict: 'member_id,activity_id' }

    }

    /* Local date string helper — YYYY-MM-DD in device's local timezone */
    function localDateStr(d = new Date()) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    /* Load all streak logs for this member — returns { activityId: [dates] } */
    async function sbLoadAllLogs() {
      if (!sb || !MEMBER_ID) return {};
      const prefix = `wt_log_${MEMBER_ID}_`;
      const { data } = await sb.from('allusbasecamp_settings')
        .select('key, value').like('key', prefix + '%');
      if (!data) return {};
      const map = {};
      data.forEach(row => {
        const actId = row.key.slice(prefix.length);
        try { map[actId] = JSON.parse(row.value); } catch {}
      });
      return map;
    }

    /* Streak completion log — per member per activity, stored in settings */
    async function sbLoadLog(activityId) {
      if (!sb || !MEMBER_ID) return [];
      const { data } = await sb.from('allusbasecamp_settings')
        .select('value').eq('key', `wt_log_${MEMBER_ID}_${activityId}`).maybeSingle();
      if (!data?.value) return [];
      try { return JSON.parse(data.value); } catch { return []; }
    }

    /* Upload a photo file or save an emoji string as the member's avatar */
    async function sbUpdateMemberAvatar(file, emojiStr) {
      if (!sb || !MEMBER_ID) return null;
      let avatar_url = emojiStr || null;

      if (file) {
        const ext  = file.name.split('.').pop()?.toLowerCase() || 'jpg';
        const path = `members/${MEMBER_ID}/avatar.${ext}`;
        // Remove old variants first
        await sb.storage.from('member-avatars').remove(
          ['jpg','jpeg','png','webp','gif','heic'].map(e => `members/${MEMBER_ID}/avatar.${e}`)
        );
        const { error: upErr } = await sb.storage
          .from('member-avatars')
          .upload(path, file, { upsert: true, contentType: file.type });
        if (!upErr) {
          const { data: urlData } = sb.storage.from('member-avatars').getPublicUrl(path);
          avatar_url = `${urlData.publicUrl}?t=${Date.now()}`;
        }
      }

      const { error } = await sb.from('allusbasecamp_members').update({ avatar_url }).eq('id', MEMBER_ID);
      if (error) throw error;
      return avatar_url;
    }

    /* ── Build streak timeline chips from completion log ── */
    function buildStreakChips(log, streak) {
      if (!log || log.length === 0 || streak === 0) return [];
      const sorted = [...new Set(log)].sort();
      const hitSet = new Set(sorted);
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const firstDate = new Date(sorted[0] + 'T00:00:00');
      // Use local date string (not UTC) so dates always match what user sees
      function ds(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
      function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
      function isoWeek(d) {
        const t = new Date(d); t.setHours(0,0,0,0);
        t.setDate(t.getDate() + 3 - (t.getDay() + 6) % 7);
        const w1 = new Date(t.getFullYear(), 0, 4);
        return 1 + Math.round(((t - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
      }
      function weekStart(d) {
        const r = new Date(d); r.setHours(0,0,0,0);
        r.setDate(r.getDate() - ((r.getDay() + 6) % 7)); return r;
      }
      const chips = [];
      if (streak < 7) {
        // Day scale: chip per day, label = day-of-month
        let cur = new Date(firstDate);
        while (ds(cur) <= ds(today)) {
          const d = ds(cur);
          chips.push({ label: String(cur.getDate()), hit: hitSet.has(d), prefix: '' });
          cur = addDays(cur, 1);
        }
      } else if (streak < 30) {
        // Week scale: chip per ISO week, label = "W" + week-number
        let cur = weekStart(firstDate);
        while (cur <= today) {
          const end = addDays(cur, 6);
          const hit = sorted.some(d => d >= ds(cur) && d <= ds(end));
          chips.push({ label: 'W' + String(isoWeek(cur)).padStart(2,'0'), hit, prefix: '' });
          cur = addDays(cur, 7);
        }
      } else if (streak < 90) {
        // Month scale: chip per month, label = "M" + month-number
        let y = firstDate.getFullYear(), m = firstDate.getMonth();
        while (y < today.getFullYear() || (y === today.getFullYear() && m <= today.getMonth())) {
          const hit = sorted.some(d => { const r = new Date(d); return r.getFullYear()===y && r.getMonth()===m; });
          chips.push({ label: 'M' + String(m+1).padStart(2,'0'), hit, prefix: '' });
          m++; if (m > 11) { m = 0; y++; }
        }
      } else if (streak < 180) {
        // Quarter scale: chip per quarter
        let y = firstDate.getFullYear(), q = Math.floor(firstDate.getMonth()/3);
        const ty = today.getFullYear(), tq = Math.floor(today.getMonth()/3);
        while (y < ty || (y===ty && q<=tq)) {
          const hit = sorted.some(d => { const r = new Date(d); return r.getFullYear()===y && Math.floor(r.getMonth()/3)===q; });
          chips.push({ label: 'Q'+(q+1), hit, prefix: '' });
          q++; if (q > 3) { q = 0; y++; }
        }
      } else if (streak < 365) {
        // Half-year scale
        let y = firstDate.getFullYear(), h = Math.floor(firstDate.getMonth()/6);
        const ty = today.getFullYear(), th = Math.floor(today.getMonth()/6);
        while (y < ty || (y===ty && h<=th)) {
          const hit = sorted.some(d => { const r = new Date(d); return r.getFullYear()===y && Math.floor(r.getMonth()/6)===h; });
          chips.push({ label: 'H'+(h+1), hit, prefix: '' });
          h++; if (h > 1) { h = 0; y++; }
        }
      } else {
        // Year scale
        let y = firstDate.getFullYear();
        while (y <= today.getFullYear()) {
          const hit = sorted.some(d => new Date(d).getFullYear()===y);
          chips.push({ label: String(y), hit, prefix: '' });
          y++;
        }
      }
      return chips;
    }

            {/* ── Activity progress by frequency ── */}

              // Group ongoing activities by frequency
              const groups = {};
              ongoing.forEach(a => {

                groups[a.freq].total++;

              const entries = FREQ_OPTIONS.filter(f => groups[f]);

                  <div className="flex flex-col gap-2">
                    {entries.map(f => {

                      const col = FREQ_COLORS[f] || { bar: '#6b7280', bg: '#f3f4f6', text: '#374151' };

                              width: `${pct}%`,

                          <span style={{ fontSize: 11, fontWeight: 700, color: '#374151', flexShrink: 0, minWidth: 36, textAlign: 'right' }}>

            {/* ── Filter tabs ── */}

    const DetailScreen = ({ activity, onBack, onUpdate, onRemove, onUpdateTip, onLogToday, lang }) => {
      const { Icon } = activity;
      const [editingTip, setEditingTip] = useState(false);
      const [tipDraft,   setTipDraft]   = useState(activity.tip || '');
      const [log, setLog] = useState([]);

      /* Keep tipDraft in sync if tip changes from outside (e.g. after save) */
      useEffect(() => { setTipDraft(activity.tip || ''); }, [activity.tip]);

      /* Load completion log when activity opens */
      useEffect(() => {
        sbLoadLog(activity.id).then(l => setLog(l || [])).catch(() => {});
      }, [activity.id]);

      const T = TRANSLATIONS[lang] || TRANSLATIONS.en;
      const actT = !activity.isCustom ? (T.acts[activity.id] || {}) : {};
      const displayLabel = actT.label || activity.label;
      const displaySub   = actT.sub   || activity.sub;

      function setStatus(s)  { onUpdate(activity.id, { status: s }); }
      function setFreq(f)    { onUpdate(activity.id, { freq: f }); }

      function handleSaveTip() {
        onUpdateTip && onUpdateTip(activity.id, tipDraft.trim() || activity.tip);
        setEditingTip(false);
      }

      function handleMission() {
        const todayStr = localDateStr();
        if (log.includes(todayStr)) return; // already logged today — no double-count
        const newLog = [...log, todayStr];
        setLog(newLog);
        sbSaveLog(activity.id, newLog).catch(console.error);
        onLogToday && onLogToday(activity.id, true);
        onUpdate(activity.id, { streak: activity.streak + 1 });
      }

      function handleReset() {
        setLog([]);
        sbSaveLog(activity.id, []).catch(console.error);
        onLogToday && onLogToday(activity.id, false);
        onUpdate(activity.id, { streak: 0 });
      }

      /* Today's date parts for sticky note */
      const _now = new Date();
      const _days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const _months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const todayDay   = _days[_now.getDay()];
      const todayDate  = _now.getDate();
      const todayMonth = _months[_now.getMonth()];
      const todayYear  = _now.getFullYear();

      return (
        <div className="flex flex-col h-full slide-in-right">

          {/* Back button */}
          <button onClick={onBack}
                  className="mx-5 flex items-center gap-1.5 text-violet-600 font-semibold text-[14px] press w-fit"
                  style={{ marginTop: 'max(16px, calc(env(safe-area-inset-top) + 8px))' }}>
            <IconBack size={18} cls=""/>
            {T.back}
          </button>

          {/* Scrollable detail body */}
          <div className="flex-1 overflow-y-auto no-scroll px-5 pb-12 mt-3">

            {/* ── Hero card ── */}
            <div className={`${activity.bg} rounded-3xl p-6 flex flex-col items-center gap-3 mb-5`}
                 style={{ position: 'relative' }}>
              {/* Today's date sticky note */}
              <div style={{
                position: 'absolute', top: 12, right: 14,
                background: '#fef08a',
                borderRadius: 10, padding: '5px 9px',
                boxShadow: '2px 3px 10px rgba(0,0,0,0.18)',
                transform: 'rotate(2.5deg)',
                textAlign: 'center', zIndex: 1, minWidth: 44,
              }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: '#92400e', textTransform: 'uppercase', letterSpacing: '0.06em' }}>{todayDay}</div>
                <div style={{ fontSize: 20, fontWeight: 900, color: '#78350f', lineHeight: 1 }}>{todayDate}</div>
                <div style={{ fontSize: 8, fontWeight: 600, color: '#92400e' }}>{todayMonth} {todayYear}</div>
              </div>
              <div className={`w-20 h-20 rounded-2xl ${activity.iconBg} flex items-center justify-center ${activity.iconCls}`}
                   style={{boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
                {activity.iconEmoji
                  ? <span style={{ fontSize: '2.8rem', lineHeight: 1 }}>{activity.iconEmoji}</span>
                  : <Icon size={44} cls="" />
                }
              </div>
              <div className="text-center">
                <h1 className="text-[22px] font-black text-gray-900">{displayLabel}</h1>
                <p className="text-[13px] text-gray-500 mt-0.5">{displaySub}</p>
              </div>
            </div>

            {/* ── Status toggle ── */}
            <div className="bg-white rounded-2xl p-4 shadow-sm mb-4">
              <p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">{T.statusLabel}</p>
              <div className="flex gap-3">
                {['ongoing','notplanned'].map(s => (
                  <button key={s} onClick={() => setStatus(s)}
                          className={`flex-1 py-3 rounded-xl text-[13px] font-bold transition-all press
                            ${activity.status === s
                              ? s === 'ongoing'
                                ? 'bg-violet-600 text-white shadow-md'
                                : 'bg-gray-200 text-gray-700'
                              : 'bg-gray-100 text-gray-400'}`}>
                    {s === 'ongoing' ? T.ongoingBtn : T.notPlannedBtn}
                  </button>
                ))}
              </div>
            </div>

            {/* ── Frequency picker ── */}
            <div className="bg-white rounded-2xl p-4 shadow-sm mb-4">
              <p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">{T.frequency}</p>
              <div className="flex flex-wrap gap-2">
                {FREQ_OPTIONS.map(f => (
                  <button key={f} onClick={() => setFreq(f)}
                          className={`px-4 py-2 rounded-xl text-[13px] font-semibold transition-all press
                            ${activity.freq === f
                              ? 'bg-violet-600 text-white shadow-sm'
                              : 'bg-gray-100 text-gray-500'}`}>
                    {T.freq[f] || f}
                  </button>
                ))}
              </div>
            </div>

            {/* ── Day streak ── */}
            <div className="bg-white rounded-2xl p-4 shadow-sm mb-4">
              <div className="flex items-center justify-between mb-3">
                <div>
                  <p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider">{T.dayStreak}</p>
                  <p className="text-[28px] font-black text-gray-800 leading-tight">{activity.streak} 🔥</p>
                </div>
                <div className="flex flex-col items-end gap-1.5">
                  <p className="text-[12px] text-gray-400 italic">
                    {activity.streak === 0 ? T.startToday : T.keepGoing}
                  </p>
                  {activity.streak > 0 && (
                    <button
                      onClick={handleReset}
                      className="text-[10px] font-semibold text-red-400 border border-red-200 rounded-full px-2.5 py-0.5 press-light hover:bg-red-50">
                      {T.reset}
                    </button>
                  )}
                </div>
              </div>

              {/* ── Streak timeline chips (log-based, alternating colors) ── */}
              {(() => {
                const chips = buildStreakChips(log, activity.streak);
                if (chips.length === 0) return (
                  <p className="text-[11px] text-gray-300 italic">{T.firstDay}</p>
                );
                const HIT_COLORS = [
                  { bg: '#16a34a', color: '#fff' },
                  { bg: '#86efac', color: '#14532d' },
                ];
                let hitIdx = 0;
                return (
                  <div className="flex flex-wrap gap-1.5">
                    {chips.map((c, i) => {
                      if (!c.hit) {
                        return (
                          <span key={i} style={{
                            minWidth: 28, height: 28, borderRadius: 8,
                            fontSize: 9, fontWeight: 700,
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                            padding: '0 4px',
                            background: '#F3F4F6', color: '#D1D5DB',
                            textDecoration: 'line-through',
                          }}>{c.label}</span>
                        );
                      }
                      const col = HIT_COLORS[hitIdx % 2]; hitIdx++;
                      return (
                        <span key={i} style={{
                          minWidth: 28, height: 28, borderRadius: 8,
                          fontSize: 9, fontWeight: 800,
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          padding: '0 4px',
                          background: col.bg, color: col.color,
                        }}>{c.label}</span>
                      );
                    })}
                  </div>
                );
              })()}
            </div>

            {/* ── Mission Accomplished ── */}
            <button
              onClick={handleMission}
              className="w-full mb-4 py-4 rounded-2xl font-black text-[16px] text-white press transition-all"
              style={{background:'linear-gradient(135deg,#16a34a,#15803d)',
                      boxShadow:'0 8px 28px rgba(22,163,74,0.38)'}}>
              {T.mission}
            </button>

            {/* ── Why it matters (editable) ── */}
            <div className="bg-white rounded-2xl p-5 shadow-sm mb-4">
              <div className="flex items-center justify-between mb-3">
                <h2 className="font-bold text-gray-900 text-[15px]">{T.whyItMatters}</h2>
                {!editingTip && (
                  <button onClick={() => setEditingTip(true)}
                    className="flex items-center gap-1 text-[12px] text-violet-500 font-semibold press-light">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    {T.edit}
                  </button>
                )}
              </div>
              {editingTip ? (
                <>
                  <textarea
                    value={tipDraft}
                    onChange={e => setTipDraft(e.target.value)}
                    rows={4} maxLength={300}
                    className="w-full bg-gray-50 border border-violet-200 rounded-xl px-3 py-2.5 text-[13px] text-gray-700 outline-none resize-none"
                    style={{ fontSize: 'max(16px,1rem)' }}
                    autoFocus />
                  <div className="flex gap-2 mt-3">
                    <button onClick={handleSaveTip}
                      className="flex-1 py-2.5 rounded-xl text-[13px] font-bold text-white press"
                      style={{ background: 'linear-gradient(135deg,#7C3AED,#6D28D9)' }}>
                      {T.save}
                    </button>
                    <button onClick={() => { setTipDraft(activity.tip || ''); setEditingTip(false); }}
                      className="flex-1 py-2.5 rounded-xl text-[13px] font-semibold bg-gray-100 text-gray-600 press-light">
                      {T.cancel}
                    </button>
                  </div>
                </>
              ) : (
                <p className="text-[13px] text-gray-500 leading-relaxed">{activity.tip}</p>
              )}
            </div>

            {/* ── Remove / Delete activity (all activities) ── */}
            <button
              onClick={() => onRemove && onRemove(activity.id)}
              className="w-full py-3.5 rounded-2xl font-bold text-[14px] press mb-2"
              style={{ background: '#fff1f2', color: '#e11d48', border: '1.5px solid #fecdd3' }}>
              {activity.isCustom ? T.deleteActivity : T.removeFromList}
            </button>

          </div>
        </div>
      );
    };

    /* ════════════════════════════════════════════════════
       ROOT APP
       ════════════════════════════════════════════════════ */
    function App() {
      const [page,        setPage]        = useState('home');
      const [selected,    setSelected]    = useState(null);
      const [activities,  setActivities]  = useState(ACTIVITIES);
      const [customDefs,  setCustomDefs]  = useState([]);   // persisted definitions
      const [levelIdx,    setLevelIdx]    = useState(0);
      const [loading,     setLoading]     = useState(true);
      const [showAddSheet,  setShowAddSheet]  = useState(false);
      const [lang,          setLang]          = useState(() => { try { return localStorage.getItem('wt_lang') || 'en'; } catch { return 'en'; } });
      const [hiddenActs,    setHiddenActs]    = useState([]);
      const [customTips,    setCustomTips]    = useState({});
      const [todayDone,     setTodayDone]     = useState(new Set()); // activityIds completed today

      /* ── Load everything from Supabase in one round-trip ── */
      useEffect(() => {
        Promise.all([
          sbLoadWellness(),
          sbLoadCustomActs(),
          sbLoadHiddenActs(),
          sbLoadCustomTips(),
          sbLoadAllLogs(),
        ]).then(([result, defs, hidden, tips, logsMap]) => {
          // Compute which activities were completed today
          const today = localDateStr();
          const done = new Set(
            Object.entries(logsMap)
              .filter(([, dates]) => Array.isArray(dates) && dates.includes(today))
              .map(([id]) => id)
          );
          setTodayDone(done);
          const wellnessRows = result?.acts || [];

          // Build hydrated built-in list (skip hidden, apply custom tips)
          const builtIn = ACTIVITIES
            .filter(a => !hidden.includes(a.id))
            .map(a => {
              const row = wellnessRows.find(r => r.activity_id === a.id);
              const withW = row ? { ...a, status: row.status, freq: row.freq, streak: row.streak } : a;
              return tips[a.id] ? { ...withW, tip: tips[a.id] } : withW;
            });

          // Build hydrated custom list (apply custom tips)
          const custom = defs.map(def => {
            const t   = COLOR_THEMES.find(c => c.key === def.colorKey) || COLOR_THEMES[0];
            const row = wellnessRows.find(r => r.activity_id === def.id);
            const withW = {
              ...def,
              bg: t.bg, iconBg: t.iconBg, iconCls: t.iconCls, border: t.border,
              status: row?.status ?? 'notplanned',
              freq:   row?.freq   ?? 'Daily',
              streak: row?.streak ?? 0,
            };
            return tips[def.id] ? { ...withW, tip: tips[def.id] } : withW;
          });

          setActivities([...builtIn, ...custom]);
          setCustomDefs(defs);
          setHiddenActs(hidden);
          setCustomTips(tips);
          if (result?.levelIdx != null) setLevelIdx(result.levelIdx);
        })
        .catch(console.error)
        .finally(() => setLoading(false));
      }, []);

      const handleSelectActivity = useCallback((act) => {
        setSelected(act);
        setPage('detail');
      }, []);

      const handleUpdateActivity = useCallback((id, changes) => {
        setActivities(prev => {
          const next = prev.map(a => a.id === id ? { ...a, ...changes } : a);
          const merged = next.find(a => a.id === id);
          sbSaveActivity(id, merged.status, merged.freq, merged.streak).catch(console.error);
          return next;
        });
        setSelected(prev => prev?.id === id ? { ...prev, ...changes } : prev);
      }, []);

      const handleAddActivity = useCallback(async (actDef) => {
        // Apply any existing custom tip override before adding
        const withTip = customTips[actDef.id] ? { ...actDef, tip: customTips[actDef.id] } : actDef;
        setActivities(prev => [...prev, withTip]);
        // Save definition (strip runtime state before persisting)
        const { status, freq, streak, bg, iconBg, iconCls, border, ...def } = actDef;
        const newDefs = [...customDefs, def];
        setCustomDefs(newDefs);
        await sbSaveCustomActs(newDefs).catch(console.error);
        // Init wellness row
        sbSaveActivity(actDef.id, actDef.status, actDef.freq, actDef.streak).catch(console.error);
      }, [customDefs]);

      /* Unified remove — hides built-ins per-member, fully deletes custom */
      const handleRemoveActivity = useCallback(async (id) => {
        const act = activities.find(a => a.id === id);
        setActivities(prev => prev.filter(a => a.id !== id));
        if (selected?.id === id) { setSelected(null); setPage('home'); }

        if (act?.isCustom) {
          const newDefs = customDefs.filter(d => d.id !== id);
          setCustomDefs(newDefs);
          await sbSaveCustomActs(newDefs).catch(console.error);
          if (sb && MEMBER_ID) {
            sb.from('allusbasecamp_wellness').delete()
              .eq('member_id', MEMBER_ID).eq('activity_id', id).catch(console.error);
          }
        } else {
          const newHidden = [...hiddenActs, id];
          setHiddenActs(newHidden);
          await sbSaveHiddenActs(newHidden).catch(console.error);
        }
      }, [activities, hiddenActs, customDefs, selected]);

      /* Save an edited "Why it matters" tip for any activity */
      const handleUpdateTip = useCallback(async (id, tip) => {
        setActivities(prev => prev.map(a => a.id === id ? { ...a, tip } : a));
        setSelected(prev => prev?.id === id ? { ...prev, tip } : prev);
        const newTips = { ...customTips, [id]: tip };
        setCustomTips(newTips);
        await sbSaveCustomTips(newTips).catch(console.error);
      }, [customTips]);

      const handleLevelChange = useCallback((idx) => {
        setLevelIdx(idx);
        sbSaveLevel(idx).catch(console.error);
      }, []);

      const handleLogToday = useCallback((actId, done) => {
        setTodayDone(prev => {
          const next = new Set(prev);
          done ? next.add(actId) : next.delete(actId);
          return next;
        });
      }, []);

      const handleBack = useCallback(() => {
        setPage('home');
        setSelected(null);
      }, []);

      if (loading) return (
        <div className="phone-frame flex items-center justify-center">
          <div className="text-center">
            <div style={{width:36,height:36,border:'3px solid #DDD6FE',borderTopColor:'#7C3AED',borderRadius:'50%',animation:'spin 0.7s linear infinite',margin:'0 auto 12px'}}/>
            <p style={{color:'#7C3AED',fontWeight:700,fontSize:14}}>Loading…</p>
          </div>
        </div>
      );

      return (
        <div className="phone-frame select-none">
          {page === 'home' && (
            <HomeScreen
              activities={activities}
              onSelectActivity={handleSelectActivity}
              levelIdx={levelIdx}
              onLevelChange={handleLevelChange}
              onOpenAddSheet={() => setShowAddSheet(true)}
              todayDone={todayDone}
              lang={lang}
              setLang={setLang}
            />
          )}
          {page === 'detail' && selected && (
            <DetailScreen
              activity={selected}
              onBack={handleBack}
              onUpdate={handleUpdateActivity}
              onRemove={handleRemoveActivity}
              onUpdateTip={handleUpdateTip}
              onLogToday={handleLogToday}
              lang={lang}
            />
          )}

          {/* AddActivitySheet lives here — direct child of phone-frame, not nested
              inside any overflow:hidden subtree, so its own scroll works correctly */}
          {showAddSheet && (
            <AddActivitySheet
              onClose={() => setShowAddSheet(false)}
              onSave={async (actDef) => {
                await handleAddActivity(actDef);
                setShowAddSheet(false);
              }}
              lang={lang}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
