<!DOCTYPE html>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            violet: {
              50: '#F5F3FF', 100: '#EDE9FE', 200: '#DDD6FE',
              300: '#C4B5FD', 400: '#A78BFA', 500: '#8B5CF6',
              600: '#7C3AED', 700: '#6D28D9', 800: '#5B21B6'

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }

    /* ── Phone frame ── */
    .phone-frame {
      position: fixed;
      inset: 0;
      background: #F5F3FF;
      overflow: hidden;
    }
    @media (min-width: 480px) {
      body { background: #1C1A2E; }
      .phone-frame {
        inset: unset;
        top: 50%;
        left: 50%;
        width: 390px;
        height: min(844px, 100dvh);
        transform: translate(-50%, -50%);
        border-radius: 44px;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.10),
          0 32px 80px rgba(0,0,0,0.55),
          0 8px 24px rgba(0,0,0,0.30);
      }
    }

    /* ── Press animation ── */
    .press { transition: transform 0.13s cubic-bezier(0.36,0.07,0.19,0.97); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .press:active { transform: scale(0.93); }
    .press-light:active { transform: scale(0.97); }

    /* ── Hide scrollbar ── */
    .no-scroll::-webkit-scrollbar { display: none; }
    .no-scroll { scrollbar-width: none; }

    /* ── Tab active pill ── */
    .tab-pill-active {
      background: white;
      color: #6D28D9;
      box-shadow: 0 2px 10px rgba(109,40,217,0.15);
    }
    .tab-pill-inactive { color: #9CA3AF; }

    /* ── Nav active ── */
    .nav-active { color: #7C3AED; }
    .nav-inactive { color: #D1D5DB; }

    /* ── Tile hover glow (desktop only) ── */
    @media (hover: hover) {
      .activity-tile:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.12); transform: translateY(-2px); }
    }
    .activity-tile { transition: transform 0.13s cubic-bezier(0.36,0.07,0.19,0.97), box-shadow 0.2s ease; }
    .activity-tile:active { transform: scale(0.93); }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Screen slide animation ── */
    @keyframes slideInRight { from { opacity:0; transform:translateX(28px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideInLeft  { from { opacity:0; transform:translateX(-28px); } to { opacity:1; transform:translateX(0); } }
    .slide-in-right { animation: slideInRight 0.22s ease both; }
    .slide-in-left  { animation: slideInLeft  0.22s ease both; }
  </style>
</head>

    /* ── Emoji avatar presets ── */
    const AVATAR_EMOJIS = [

    /* ── Supabase helpers ── */
    const sb = window.sb || null;

    async function sbLoadWellness() {
      if (!sb || !MEMBER_ID) return null;
      const [{ data: acts }, { data: lvl }] = await Promise.all([
        sb.from('allusbasecamp_wellness').select('*').eq('member_id', MEMBER_ID),
        sb.from('allusbasecamp_wellness_level').select('level_idx').eq('member_id', MEMBER_ID).maybeSingle(),
      ]);
      return { acts: acts || [], levelIdx: lvl?.level_idx ?? null };
    }

    async function sbSaveActivity(id, status, freq, streak) {
      if (!sb || !MEMBER_ID) return;
      await sb.from('allusbasecamp_wellness').upsert(
        { member_id: MEMBER_ID, activity_id: id, status, freq, streak, updated_at: new Date().toISOString() },
        { onConflict: 'member_id,activity_id' }
      );
    }

    async function sbSaveLevel(levelIdx) {
      if (!sb || !MEMBER_ID) return;
      await sb.from('allusbasecamp_wellness_level').upsert(
        { member_id: MEMBER_ID, level_idx: levelIdx, updated_at: new Date().toISOString() },
        { onConflict: 'member_id' }
      );
    }

    /* Upload a photo file or save an emoji string as the member's avatar */
    async function sbUpdateMemberAvatar(file, emojiStr) {
      if (!sb || !MEMBER_ID) return null;
      let avatar_url = emojiStr || null;

      if (file) {
        const ext  = file.name.split('.').pop()?.toLowerCase() || 'jpg';
        const path = `members/${MEMBER_ID}/avatar.${ext}`;
        // Remove old variants first
        await sb.storage.from('member-avatars').remove(
          ['jpg','jpeg','png','webp','gif','heic'].map(e => `members/${MEMBER_ID}/avatar.${e}`)
        );
        const { error: upErr } = await sb.storage
          .from('member-avatars')
          .upload(path, file, { upsert: true, contentType: file.type });
        if (!upErr) {
          const { data: urlData } = sb.storage.from('member-avatars').getPublicUrl(path);
          avatar_url = `${urlData.publicUrl}?t=${Date.now()}`;
        }
      }

      const { error } = await sb.from('allusbasecamp_members').update({ avatar_url }).eq('id', MEMBER_ID);
      if (error) throw error;
      return avatar_url;
    }

    /* Save / load custom activity definitions per member */
    async function sbSaveCustomActs(defs) {
      if (!sb || !MEMBER_ID) return;
      await sb.from('allusbasecamp_settings').upsert(
        { key: `wt_custom_acts_${MEMBER_ID}`, value: JSON.stringify(defs), updated_at: new Date().toISOString() },
        { onConflict: 'key' }
      );
    }

    async function sbLoadCustomActs() {
      if (!sb || !MEMBER_ID) return [];
      const { data } = await sb.from('allusbasecamp_settings')
        .select('value').eq('key', `wt_custom_acts_${MEMBER_ID}`).maybeSingle();
      if (!data?.value) return [];
      try { return JSON.parse(data.value); } catch { return []; }
    }

    /* ════════════════════════════════════════════════════
       ADD ACTIVITY SHEET
       ════════════════════════════════════════════════════ */
    function AddActivitySheet({ onClose, onSave }) {
      const [name,          setName]          = useState('');
      const [sub,           setSub]           = useState('');
      const [tip,           setTip]           = useState('');
      const [selectedIcon,  setSelectedIcon]  = useState('🏋️');
      const [selectedColor, setSelectedColor] = useState('violet');
      const [saving,        setSaving]        = useState(false);

      const theme = COLOR_THEMES.find(t => t.key === selectedColor) || COLOR_THEMES[0];

      async function handleCreate() {
        if (!name.trim()) return;
        const newAct = {
          id: `custom_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
          label:     name.trim(),
          sub:       sub.trim()  || 'Custom activity',
          tip:       tip.trim()  || 'Build this habit consistently for lasting results.',
          iconEmoji: selectedIcon,
          colorKey:  selectedColor,
          bg:        theme.bg,
          iconBg:    theme.iconBg,
          iconCls:   theme.iconCls,
          border:    theme.border,
          status:    'notplanned',
          streak:    0,
          freq:      'Daily',
          isCustom:  true,
        };
        setSaving(true);
        try { await onSave(newAct); } finally { setSaving(false); }
      }

      return (
        <div className="absolute inset-0 z-50 flex items-end"
             style={{ background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(4px)' }}
             onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="w-full bg-white rounded-t-3xl shadow-2xl"
               style={{ maxHeight: '92%', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>

            {/* Sticky header */}
            <div className="sticky top-0 bg-white px-5 pt-4 pb-3 border-b border-gray-100 z-10">
              <div className="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-3" />
              <div className="flex items-center justify-between">
                <h3 className="font-black text-gray-900 text-[18px]">New Activity</h3>
                <button onClick={onClose}
                  className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 text-[14px] press-light">
                  ✕
                </button>
              </div>
            </div>

            <div className="px-5 pb-10 pt-4" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

              {/* Live preview tile */}

                </div>
                <div style={{ flex: 1, minWidth: 0 }}>

                      className={`w-9 h-9 rounded-full press-light transition-all ${selectedColor === t.key ? 'ring-[3px] ring-offset-2 ring-gray-500 scale-110' : 'opacity-80'}`}

                  boxShadow:   (!name.trim() || saving) ? 'none'    : '0 8px 24px rgba(109,40,217,0.35)',
                  cursor:      (!name.trim() || saving) ? 'default'  : 'pointer',

                {saving ? 'Creating…' : '＋ Create Activity'}
              </button>

            </div>
          </div>
        </div>
      );

    /* ════════════════════════════════════════════════════
       AVATAR UPLOAD SHEET
       ════════════════════════════════════════════════════ */
    function AvatarSheet({ onClose, onSave }) {
      const fileRef          = useRef(null);
      const [saving, setSaving] = useState(false);

      async function handleFile(e) {
        const f = e.target.files[0];
        if (!f) return;
        e.target.value = '';
        setSaving(true);
        try { await onSave(f, null); } finally { setSaving(false); }
      }

      async function handleEmoji(emoji) {
        setSaving(true);
        try { await onSave(null, `emoji:${emoji}`); } finally { setSaving(false); }
      }

      return (
        <div className="absolute inset-0 z-50 flex items-end"
             style={{ background: 'rgba(0,0,0,0.45)', backdropFilter: 'blur(4px)' }}
             onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="w-full bg-white rounded-t-3xl p-5 pb-10 shadow-2xl"
               style={{ maxHeight: '72%', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>

            {/* Handle */}
            <div className="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-5" />

            <h3 className="font-bold text-gray-900 text-[17px] text-center mb-5">Change Photo</h3>

            {/* Upload photo */}
            <button onClick={() => fileRef.current?.click()} disabled={saving}
              className="w-full py-3.5 rounded-2xl font-bold text-[15px] text-white press mb-5 flex items-center justify-center gap-2"
              style={{ background: 'linear-gradient(135deg,#7C3AED,#6D28D9)', opacity: saving ? 0.6 : 1 }}>
              📷 Upload Photo
            </button>
            <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile} />

            {/* Divider */}
            <div className="flex items-center gap-3 mb-4">
              <div className="flex-1 h-px bg-gray-100" />
              <span className="text-[12px] text-gray-400 font-medium">or pick an avatar</span>
              <div className="flex-1 h-px bg-gray-100" />
            </div>

            {/* Emoji grid */}
            <div className="grid gap-2" style={{ gridTemplateColumns: 'repeat(5,1fr)' }}>
              {AVATAR_EMOJIS.map(emoji => (
                <button key={emoji} onClick={() => handleEmoji(emoji)} disabled={saving}
                  className="text-[1.7rem] py-2 rounded-2xl press"
                  style={{ background: '#F5F3FF', lineHeight: 1.4, opacity: saving ? 0.6 : 1 }}>
                  {emoji}
                </button>
              ))}
            </div>

          </div>
        </div>
      );
    }

       ════════════════════════════════════════════════════ */

                  <div className="flex items-center gap-2">
                    <span className="font-bold text-gray-900 text-[15px]">{MEMBER_NAME}</span>
                    {/* Tappable level badge */}
                    <div className="relative">
                      <button

    /* ════════════════════════════════════════════════════
       DETAIL SCREEN
       ════════════════════════════════════════════════════ */
    const DetailScreen = ({ activity, onBack, onUpdate, onRemove, onUpdateTip }) => {
      const { Icon } = activity;
      const [editingTip, setEditingTip] = useState(false);
      const [tipDraft,   setTipDraft]   = useState(activity.tip || '');

      /* Keep tipDraft in sync if tip changes from outside (e.g. after save) */
      useEffect(() => { setTipDraft(activity.tip || ''); }, [activity.tip]);

      function setStatus(s)  { onUpdate(activity.id, { status: s }); }
      function setFreq(f)    { onUpdate(activity.id, { freq: f }); }

      function handleSaveTip() {
        onUpdateTip && onUpdateTip(activity.id, tipDraft.trim() || activity.tip);
        setEditingTip(false);
      }

      return (
        <div className="flex flex-col h-full slide-in-right">

          {/* Back button */}
          <button onClick={onBack}
                  className="mx-5 mt-4 flex items-center gap-1.5 text-violet-600 font-semibold text-[14px] press w-fit">
            <IconBack size={18} cls=""/>
            Back
          </button>

          {/* Scrollable detail body */}
          <div className="flex-1 overflow-y-auto no-scroll px-5 pb-12 mt-3">

            {/* ── Hero card ── */}
            <div className={`${activity.bg} rounded-3xl p-6 flex flex-col items-center gap-3 mb-5`}>
              <div className={`w-20 h-20 rounded-2xl ${activity.iconBg} flex items-center justify-center ${activity.iconCls}`}
                   style={{boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
                {activity.iconEmoji
                  ? <span style={{ fontSize: '2.8rem', lineHeight: 1 }}>{activity.iconEmoji}</span>
                  : <Icon size={44} cls="" />
                }
              </div>
              <div className="text-center">
                <h1 className="text-[22px] font-black text-gray-900">{activity.label}</h1>
                <p className="text-[13px] text-gray-500 mt-0.5">{activity.sub}</p>
              </div>
            </div>

            {/* ── Status toggle ── */}
            <div className="bg-white rounded-2xl p-4 shadow-sm mb-4">
              <p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">Status</p>
              <div className="flex gap-3">
                {['ongoing','notplanned'].map(s => (
                  <button key={s} onClick={() => setStatus(s)}
                          className={`flex-1 py-3 rounded-xl text-[13px] font-bold transition-all press
                            ${activity.status === s
                              ? s === 'ongoing'
                                ? 'bg-violet-600 text-white shadow-md'
                                : 'bg-gray-200 text-gray-700'
                              : 'bg-gray-100 text-gray-400'}`}>
                    {s === 'ongoing' ? '✅ Ongoing' : '⏸ Not Planned'}
                  </button>
                ))}
              </div>
            </div>

            {/* ── Frequency picker ── */}
            <div className="bg-white rounded-2xl p-4 shadow-sm mb-4">
              <p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">Frequency</p>
              <div className="flex flex-wrap gap-2">
                {FREQ_OPTIONS.map(f => (
                  <button key={f} onClick={() => setFreq(f)}
                          className={`px-4 py-2 rounded-xl text-[13px] font-semibold transition-all press
                            ${activity.freq === f
                              ? 'bg-violet-600 text-white shadow-sm'
                              : 'bg-gray-100 text-gray-500'}`}>
                    {f}
                  </button>
                ))}
              </div>
            </div>

            {/* ── Day streak ── */}
            <div className="bg-white rounded-2xl p-4 shadow-sm mb-4">
              <div className="flex items-center justify-between mb-3">
                <div>
                  <p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Day Streak</p>
                  <p className="text-[28px] font-black text-gray-800 leading-tight">{activity.streak} 🔥</p>
                </div>
                <div className="flex flex-col items-end gap-1.5">
                  <p className="text-[12px] text-gray-400 italic">
                    {activity.streak === 0 ? 'Start today!' : 'Keep going!'}
                  </p>
                  {activity.streak > 0 && (
                    <button
                      onClick={() => onUpdate(activity.id, { streak: 0 })}
                      className="text-[10px] font-semibold text-red-400 border border-red-200 rounded-full px-2.5 py-0.5 press-light hover:bg-red-50">
                      ↺ Reset
                    </button>
                  )}
                </div>
              </div>

              {/* ── Streak badge row: D / W / M ── */}
              {(() => {
                const s = activity.streak;
                const months = Math.floor(s / 30);
                const weeks  = Math.floor((s % 30) / 7);
                const days   = s % 7;
                const badges = [
                  ...Array(months).fill({ label: 'M', cls: 'bg-rose-500   text-white' }),
                  ...Array(weeks).fill({  label: 'W', cls: 'bg-violet-500 text-white' }),
                  ...Array(days).fill({   label: 'D', cls: 'bg-gray-200   text-gray-600' }),
                ];
                if (badges.length === 0) return (
                  <p className="text-[11px] text-gray-300 italic">Complete your first day to start tracking</p>
                );
                return (
                  <div className="flex flex-wrap gap-1.5">
                    {badges.map((b, i) => (
                      <span key={i} className={`w-7 h-7 rounded-lg text-[10px] font-black flex items-center justify-center ${b.cls}`}>
                        {b.label}
                      </span>
                    ))}
                  </div>
                );
              })()}
            </div>

            {/* ── Mission Accomplished ── */}
            <button
              onClick={() => onUpdate(activity.id, { streak: activity.streak + 1 })}
              className="w-full mb-4 py-4 rounded-2xl font-black text-[16px] text-white press transition-all"
              style={{background:'linear-gradient(135deg,#16a34a,#15803d)',
                      boxShadow:'0 8px 28px rgba(22,163,74,0.38)'}}>
              🎯 Mission Accomplished!
            </button>

            {/* ── Why it matters (editable) ── */}
            <div className="bg-white rounded-2xl p-5 shadow-sm mb-4">
              <div className="flex items-center justify-between mb-3">
                <h2 className="font-bold text-gray-900 text-[15px]">Why it matters</h2>
                {!editingTip && (
                  <button onClick={() => setEditingTip(true)}
                    className="flex items-center gap-1 text-[12px] text-violet-500 font-semibold press-light">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Edit
                  </button>
                )}
              </div>
              {editingTip ? (
                <>
                  <textarea
                    value={tipDraft}
                    onChange={e => setTipDraft(e.target.value)}
                    rows={4} maxLength={300}
                    className="w-full bg-gray-50 border border-violet-200 rounded-xl px-3 py-2.5 text-[13px] text-gray-700 outline-none resize-none"
                    style={{ fontSize: 'max(16px,1rem)' }}
                    autoFocus />
                  <div className="flex gap-2 mt-3">
                    <button onClick={handleSaveTip}
                      className="flex-1 py-2.5 rounded-xl text-[13px] font-bold text-white press"
                      style={{ background: 'linear-gradient(135deg,#7C3AED,#6D28D9)' }}>
                      Save
                    </button>
                    <button onClick={() => { setTipDraft(activity.tip || ''); setEditingTip(false); }}
                      className="flex-1 py-2.5 rounded-xl text-[13px] font-semibold bg-gray-100 text-gray-600 press-light">
                      Cancel
                    </button>
                  </div>
                </>
              ) : (
                <p className="text-[13px] text-gray-500 leading-relaxed">{activity.tip}</p>
              )}
            </div>

            {/* ── Remove / Delete activity (all activities) ── */}
            <button
              onClick={() => onRemove && onRemove(activity.id)}
              className="w-full py-3.5 rounded-2xl font-bold text-[14px] press mb-2"
              style={{ background: '#fff1f2', color: '#e11d48', border: '1.5px solid #fecdd3' }}>
              {activity.isCustom ? '🗑 Delete Activity' : '✕ Remove from My List'}
            </button>

          </div>
        </div>
      );
    };

    /* ════════════════════════════════════════════════════
       ROOT APP
       ════════════════════════════════════════════════════ */
    function App() {
      const [page,        setPage]        = useState('home');
      const [selected,    setSelected]    = useState(null);
      const [activities,  setActivities]  = useState(ACTIVITIES);
      const [customDefs,  setCustomDefs]  = useState([]);   // persisted definitions
      const [levelIdx,    setLevelIdx]    = useState(0);
      const [loading,     setLoading]     = useState(true);
      const [showAddSheet,  setShowAddSheet]  = useState(false);
      const [hiddenActs,    setHiddenActs]    = useState([]);
      const [customTips,    setCustomTips]    = useState({});

      /* ── Load everything from Supabase in one round-trip ── */
      useEffect(() => {
        Promise.all([
          sbLoadWellness(),
          sbLoadCustomActs(),
          sbLoadHiddenActs(),
          sbLoadCustomTips(),
        ]).then(([result, defs, hidden, tips]) => {
          const wellnessRows = result?.acts || [];

          // Build hydrated built-in list (skip hidden, apply custom tips)
          const builtIn = ACTIVITIES
            .filter(a => !hidden.includes(a.id))
            .map(a => {
              const row = wellnessRows.find(r => r.activity_id === a.id);
              const withW = row ? { ...a, status: row.status, freq: row.freq, streak: row.streak } : a;
              return tips[a.id] ? { ...withW, tip: tips[a.id] } : withW;
            });

          // Build hydrated custom list (apply custom tips)
          const custom = defs.map(def => {
            const t   = COLOR_THEMES.find(c => c.key === def.colorKey) || COLOR_THEMES[0];
            const row = wellnessRows.find(r => r.activity_id === def.id);
            const withW = {
              ...def,
              bg: t.bg, iconBg: t.iconBg, iconCls: t.iconCls, border: t.border,
              status: row?.status ?? 'notplanned',
              freq:   row?.freq   ?? 'Daily',
              streak: row?.streak ?? 0,
            };
            return tips[def.id] ? { ...withW, tip: tips[def.id] } : withW;
          });

          setActivities([...builtIn, ...custom]);
          setCustomDefs(defs);
          setHiddenActs(hidden);
          setCustomTips(tips);
          if (result?.levelIdx != null) setLevelIdx(result.levelIdx);
        })
        .catch(console.error)
        .finally(() => setLoading(false));
      }, []);

      const handleSelectActivity = useCallback((act) => {
        setSelected(act);
        setPage('detail');
      }, []);

      const handleUpdateActivity = useCallback((id, changes) => {
        setActivities(prev => {
          const next = prev.map(a => a.id === id ? { ...a, ...changes } : a);
          const merged = next.find(a => a.id === id);
          sbSaveActivity(id, merged.status, merged.freq, merged.streak).catch(console.error);
          return next;
        });
        setSelected(prev => prev?.id === id ? { ...prev, ...changes } : prev);
      }, []);

      const handleAddActivity = useCallback(async (actDef) => {
        // Apply any existing custom tip override before adding
        const withTip = customTips[actDef.id] ? { ...actDef, tip: customTips[actDef.id] } : actDef;
        setActivities(prev => [...prev, withTip]);
        // Save definition (strip runtime state before persisting)
        const { status, freq, streak, bg, iconBg, iconCls, border, ...def } = actDef;
        const newDefs = [...customDefs, def];
        setCustomDefs(newDefs);
        await sbSaveCustomActs(newDefs).catch(console.error);
        // Init wellness row
        sbSaveActivity(actDef.id, actDef.status, actDef.freq, actDef.streak).catch(console.error);
      }, [customDefs]);

      /* Unified remove — hides built-ins per-member, fully deletes custom */
      const handleRemoveActivity = useCallback(async (id) => {
        const act = activities.find(a => a.id === id);
        setActivities(prev => prev.filter(a => a.id !== id));
        if (selected?.id === id) { setSelected(null); setPage('home'); }

        if (act?.isCustom) {
          const newDefs = customDefs.filter(d => d.id !== id);
          setCustomDefs(newDefs);
          await sbSaveCustomActs(newDefs).catch(console.error);
          if (sb && MEMBER_ID) {
            sb.from('allusbasecamp_wellness').delete()
              .eq('member_id', MEMBER_ID).eq('activity_id', id).catch(console.error);
          }
        } else {
          const newHidden = [...hiddenActs, id];
          setHiddenActs(newHidden);
          await sbSaveHiddenActs(newHidden).catch(console.error);
        }
      }, [activities, hiddenActs, customDefs, selected]);

      /* Save an edited "Why it matters" tip for any activity */
      const handleUpdateTip = useCallback(async (id, tip) => {
        setActivities(prev => prev.map(a => a.id === id ? { ...a, tip } : a));
        setSelected(prev => prev?.id === id ? { ...prev, tip } : prev);
        const newTips = { ...customTips, [id]: tip };
        setCustomTips(newTips);
        await sbSaveCustomTips(newTips).catch(console.error);
      }, [customTips]);

      const handleLevelChange = useCallback((idx) => {
        setLevelIdx(idx);
        sbSaveLevel(idx).catch(console.error);
      }, []);

      const handleBack = useCallback(() => {
        setPage('home');
        setSelected(null);
      }, []);

      if (loading) return (
        <div className="phone-frame flex items-center justify-center">
          <div className="text-center">
            <div style={{width:36,height:36,border:'3px solid #DDD6FE',borderTopColor:'#7C3AED',borderRadius:'50%',animation:'spin 0.7s linear infinite',margin:'0 auto 12px'}}/>
            <p style={{color:'#7C3AED',fontWeight:700,fontSize:14}}>Loading…</p>
          </div>
        </div>
      );

      return (
        <div className="phone-frame select-none">
          {page === 'home' && (
            <HomeScreen
              activities={activities}
              onSelectActivity={handleSelectActivity}
              levelIdx={levelIdx}
              onLevelChange={handleLevelChange}
              onOpenAddSheet={() => setShowAddSheet(true)}
            />
          )}
          {page === 'detail' && selected && (
            <DetailScreen
              activity={selected}
              onBack={handleBack}
              onUpdate={handleUpdateActivity}
              onRemove={handleRemoveActivity}
              onUpdateTip={handleUpdateTip}
            />
          )}

          {/* AddActivitySheet lives here — direct child of phone-frame, not nested
              inside any overflow:hidden subtree, so its own scroll works correctly */}
          {showAddSheet && (
            <AddActivitySheet
              onClose={() => setShowAddSheet(false)}
              onSave={async (actDef) => {
                await handleAddActivity(actDef);
                setShowAddSheet(false);
              }}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
